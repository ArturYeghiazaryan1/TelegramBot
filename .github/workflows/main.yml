name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            # === 1. Установка docker (если нет) ===
            if ! command -v docker &> /dev/null
            then
              sudo apt update
              sudo apt install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            # === 2. Установка aws cli ===
            if ! command -v aws &> /dev/null
            then
              sudo apt install -y awscli
            fi

            # === 3. Настройка AWS ===
            aws configure set aws_access_key_id ${{ secrets.IAM_ACCESS_KEY }}
            aws configure set aws_secret_access_key ${{ secrets.IAM_SECRET_KEY }}
            aws configure set region ${{ secrets.S3_REGION }}

            # === 4. Клонирование проекта ===
            if [ ! -d "rate_bot_ec2" ]; then
              git clone https://github.com/AlbertZaqaryan/rate_bot_ec2.git
            fi

            cd rate_bot_ec2
            git pull origin main

            # === 5. Скачать .env из S3 ===
            aws s3 cp s3://${{ secrets.S3_NAME }}/.env .env

            # === 6. Остановить старый контейнер ===
            sudo docker stop rate_bot || true
            sudo docker rm rate_bot || true

            # === 7. Собрать образ ===
            sudo docker build -t rate_bot .

            # === 8. Запустить контейнер ===
            sudo docker run -d \
              --name rate_bot \
              --env-file .env \
              rate_bot
